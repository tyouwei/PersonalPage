# Static Next.js export: `next build` writes HTML/JS/CSS to `out/`.
#
# Cloudflare Dashboard → Settings → Builds & deployments:
#   - Framework preset: None
#   - Build command: npm run build
#   - Build output directory: out
#   - Deploy command (if required): npm run deploy
#     (= npx wrangler pages deploy out --project-name=thamyouwei-page)
#
# Never use `npx wrangler deploy` — that targets Workers, not Pages static assets.

name = "thamyouwei-page"
compatibility_date = "2025-04-05"
pages_build_output_dir = "out"
